<!DOCTYPE html>
<html>
<head>
    <title>Federated Fraud Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; padding: 20px; color: white; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #16213e; border-radius: 10px; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: #16213e; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #00d4ff; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: none; }
        button { background: #00d4ff; color: #1a1a2e; padding: 12px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #00b8e6; }
        .result { margin-top: 15px; padding: 15px; border-radius: 5px; text-align: center; }
        .result-high { background: #ff4444; }
        .result-medium { background: #ffaa00; color: #1a1a2e; }
        .result-low { background: #00c851; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .checkbox-group { display: flex; gap: 20px; margin: 10px 0; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Federated Fraud Detection</h1>
            <p>Privacy-preserving cross-bank fraud detection</p>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat"><div class="stat-value" id="total">0</div><div>Transactions</div></div>
            <div class="stat"><div class="stat-value" id="blocked">0</div><div>Blocked</div></div>
            <div class="stat"><div class="stat-value" id="flagged">0</div><div>Flagged</div></div>
            <div class="stat"><div class="stat-value" id="approved">0</div><div>Approved</div></div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📝 Test Transaction</h2>
                <input type="number" id="amount" placeholder="Amount ($)" value="100">
                <select id="merchant">
                    <option>Coffee Shop</option><option>Amazon</option><option>Walmart</option>
                    <option>Foreign Exchange</option><option>Casino</option>
                </select>
                <input type="number" id="velocity" placeholder="Recent transactions (last hour)" value="2">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="is_foreign"> International</label>
                    <label><input type="checkbox" id="is_night"> Night Time</label>
                </div>
                <input type="number" id="card_age" placeholder="Card age (days)" value="365">
                <button onclick="detectFraud()">🔍 Detect Fraud</button>
                <div id="result" style="display:none" class="result"></div>
            </div>
            
            <div class="card">
                <h2>📊 Live Feed</h2>
                <button onclick="randomTransaction()">🎲 Random Test</button>
                <div style="margin-top: 15px; max-height: 300px; overflow-y: auto;">
                    <table>
                        <thead><tr><th>Time</th><th>Amount</th><th>Merchant</th><th>Score</th><th>Status</th></tr></thead>
                        <tbody id="history"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function updateStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('total').innerText = stats.total;
            document.getElementById('blocked').innerText = stats.blocked;
            document.getElementById('flagged').innerText = stats.flagged;
            document.getElementById('approved').innerText = stats.approved;
        }
        
        async function updateHistory() {
            const res = await fetch('/api/history');
            const history = await res.json();
            const tbody = document.getElementById('history');
            tbody.innerHTML = history.reverse().map(t => `
                <tr>
                    <td>${new Date(t.transaction.timestamp).toLocaleTimeString()}</td>
                    <td>$${t.transaction.amount}</td>
                    <td>${t.transaction.merchant}</td>
                    <td>${t.result.fraud_score.toFixed(3)}</td>
                    <td style="color:${t.result.color === 'red' ? '#ff4444' : t.result.color === 'yellow' ? '#ffaa00' : '#00c851'}">${t.result.action}</td>
                </tr>
            `).join('');
        }
        
        async function detectFraud() {
            const data = {
                amount: parseFloat(document.getElementById('amount').value),
                merchant: document.getElementById('merchant').value,
                velocity: parseInt(document.getElementById('velocity').value),
                card_age: parseInt(document.getElementById('card_age').value),
                is_foreign: document.getElementById('is_foreign').checked,
                is_night: document.getElementById('is_night').checked
            };
            
            const res = await fetch('/api/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const result = await res.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = `result result-${result.severity.toLowerCase()}`;
            resultDiv.innerHTML = `
                <strong>Fraud Score: ${result.fraud_score.toFixed(3)}</strong><br>
                <strong>Decision: ${result.action}</strong><br>
                Risk Level: ${result.severity}
            `;
            
            updateStats();
            updateHistory();
        }
        
        async function randomTransaction() {
            const res = await fetch('/api/random');
            const result = await res.json();
            updateStats();
            updateHistory();
        }
        
        setInterval(() => { updateStats(); updateHistory(); }, 2000);
        updateStats();
        updateHistory();
    </script>
</body>
</html>
