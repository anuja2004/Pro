# Model architecture
model:
  layer1_units: 64
  layer2_units: 32
  layer3_units: 16
  dropout1: 0.3
  dropout2: 0.2
  dropout3: 0.1
  l2_lambda: 0.001

# Training parameters
training:
  batch_size: 64
  client_learning_rate: 0.001
  server_learning_rate: 1.0
  clients_per_round: 2
  local_epochs: 10       # increased from 5 — more local iterations per round for deeper learning

# Privacy parameters
privacy:
  enabled: false
  noise_multiplier: 1.1
  l2_norm_clip: 0.1
  epsilon: 1.0
  delta: 1e-5

# Data parameters
data:
  test_split: 0.2
  validation_split: 0.1
  random_seed: 42
